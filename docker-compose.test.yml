services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: glitchmao
      POSTGRES_PASSWORD: glitchmao
      POSTGRES_DB: glitchmao_test
    ports:
      - "5433:5432"
    volumes:
      - pg_data_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchmao -d glitchmao_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  web-test:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.dev
    working_dir: /workspace
    command: sh -lc "npm install --prefix apps/web-nuxt && npm run db:migrate:sql --prefix apps/web-nuxt && npm run test --prefix apps/web-nuxt && npm run build --prefix apps/web-nuxt"
    environment:
      DATABASE_URL: postgresql://glitchmao:glitchmao@postgres:5432/glitchmao_test
      GPG_KEY_ID: test@glitchmao.local
      SIGNER_SERVICE_URL: http://signer:4000
      VERIFICATION_BASE_URL: http://localhost:3000/verify
      STORAGE_PROVIDER: none
      STORAGE_BUCKET: ""
      STORAGE_BASE_URL: ""
    volumes:
      - .:/workspace
      - web_test_npm_cache:/root/.npm
      - web_test_cargo_cache:/usr/local/cargo/registry
    depends_on:
      postgres:
        condition: service_healthy
      signer:
        condition: service_started

  signer:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.dev
    working_dir: /workspace
    command: sh -lc "mkdir -p /gnupg && chmod 700 /gnupg && cargo run -p signer-service"
    environment:
      GPG_KEY_ID: test@glitchmao.local
      SIGNER_DEFAULT_KEY_ID: test@glitchmao.local
      SIGNER_HOST: 0.0.0.0
      SIGNER_PORT: 4000
      GNUPGHOME: /gnupg
    volumes:
      - .:/workspace
      - signer_test_cargo_cache:/usr/local/cargo/registry
      - signer_test_gpg_home:/gnupg

volumes:
  pg_data_test:
  web_test_npm_cache:
  web_test_cargo_cache:
  signer_test_cargo_cache:
  signer_test_gpg_home:
