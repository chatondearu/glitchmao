name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (example: v0.1.0-alpha.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install web dependencies
        run: npm ci --prefix apps/web-nuxt

      - name: Build web app
        run: npm run build --prefix apps/web-nuxt

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check Rust workspace
        run: cargo check --workspace

  release:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: resolve_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        id: notes
        run: |
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "## Alpha release" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "- First end-to-end MVP release" >> "$GITHUB_OUTPUT"
          echo "- Nuxt web app + Rust signer service + PostgreSQL stack" >> "$GITHUB_OUTPUT"
          echo "- Signature creation, verification, onboarding, and key management" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          name: ${{ steps.resolve_tag.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          prerelease: true
