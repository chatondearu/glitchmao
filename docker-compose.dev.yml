services:
  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.dev
    working_dir: /workspace
    command: sh -lc "npm install --prefix apps/web-nuxt && npm run db:migrate:sql --prefix apps/web-nuxt && npm run dev --prefix apps/web-nuxt -- --host 0.0.0.0 --port 3000"
    volumes:
      - .:/workspace
      - web_npm_cache:/root/.npm
      - web_cargo_cache:/usr/local/cargo/registry
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://glitchmao:glitchmao@postgres:5432/glitchmao
      GPG_KEY_ID: test@glitchmao.local
      SIGNER_SERVICE_URL: http://signer:4000
      VERIFICATION_BASE_URL: http://localhost:3000/verify
      STORAGE_PROVIDER: none
      STORAGE_BUCKET: ""
      STORAGE_BASE_URL: ""
    depends_on:
      postgres:
        condition: service_healthy
      signer:
        condition: service_started

  signer:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.dev
    working_dir: /workspace
    command: sh -lc "mkdir -p /gnupg && chmod 700 /gnupg && cargo run -p signer-service"
    volumes:
      - .:/workspace
      - signer_cargo_cache:/usr/local/cargo/registry
      - signer_gpg_home:/gnupg
    environment:
      GPG_KEY_ID: test@glitchmao.local
      SIGNER_DEFAULT_KEY_ID: test@glitchmao.local
      SIGNER_HOST: 0.0.0.0
      SIGNER_PORT: 4000
      GNUPGHOME: /gnupg

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: glitchmao
      POSTGRES_PASSWORD: glitchmao
      POSTGRES_DB: glitchmao
    ports:
      - "5432:5432"
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchmao -d glitchmao"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data_dev:
  web_npm_cache:
  web_cargo_cache:
  signer_cargo_cache:
  signer_gpg_home:
