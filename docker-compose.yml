services:
  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.prod
      target: web-prod
    command: sh -lc "node apps/web-nuxt/scripts/run-migrations.mjs && npm run preview --prefix apps/web-nuxt -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${SERVICE_USER_POSTGRES:-glitchmao}:${SERVICE_PASSWORD_POSTGRES:-glitchmao}@postgres:5432/glitchmao}
      COOLIFY_FQDN: ${COOLIFY_FQDN:-}
      SERVICE_URL_WEB_3000: ${SERVICE_URL_WEB_3000:-}
      SERVICE_PASSWORD_APP: ${SERVICE_PASSWORD_APP:-}
      SERVICE_BASE64_APP: ${SERVICE_BASE64_APP:-}
      GPG_KEY_ID: ${GPG_KEY_ID:-test@glitchmao.local}
      SIGNER_SERVICE_URL: ${SIGNER_SERVICE_URL:-http://signer:4000}
      VERIFICATION_BASE_URL: ${VERIFICATION_BASE_URL:-${SERVICE_URL_WEB:-https://${COOLIFY_FQDN:-localhost}}/verify}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-none}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-}
      STORAGE_BASE_URL: ${STORAGE_BASE_URL:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.fastmail.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@glitchmao.local}
      PASSWORD_RESET_BASE_URL: ${PASSWORD_RESET_BASE_URL:-${SERVICE_URL_WEB:-https://${COOLIFY_FQDN:-localhost}}/reset-password}
      SIGNER_SECURITY_MODE: ${SIGNER_SECURITY_MODE:-secure}
      SIGNER_JWT_SECRET: ${SIGNER_JWT_SECRET:-${SERVICE_PASSWORD_APP:-change-me-in-env}}
      SIGNER_JWT_TTL_SEC: ${SIGNER_JWT_TTL_SEC:-60}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      postgres:
        condition: service_healthy
      signer:
        condition: service_healthy

  signer:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.prod
      target: signer-prod
    command: sh -lc "mkdir -p /gnupg && chmod 700 /gnupg && signer-service"
    restart: unless-stopped
    environment:
      GPG_KEY_ID: ${GPG_KEY_ID:-test@glitchmao.local}
      SIGNER_DEFAULT_KEY_ID: ${SIGNER_DEFAULT_KEY_ID:-test@glitchmao.local}
      SIGNER_SECURITY_MODE: ${SIGNER_SECURITY_MODE:-secure}
      SIGNER_INSECURE_BIND: ${SIGNER_INSECURE_BIND:-127.0.0.1}
      SIGNER_JWT_SECRET: ${SIGNER_JWT_SECRET:-change-me-in-env}
      SIGNER_HOST: ${SIGNER_HOST:-0.0.0.0}
      SIGNER_PORT: ${SIGNER_PORT:-4000}
      GNUPGHOME: ${GNUPGHOME_DOCKER:-/gnupg}
    volumes:
      - signer_prod_gpg_home:/gnupg
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4000/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-${SERVICE_USER_POSTGRES:-glitchmao}}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-${SERVICE_PASSWORD_POSTGRES:-glitchmao}}
      POSTGRES_DB: ${POSTGRES_DB:-glitchmao}
      SERVICE_USER_POSTGRES: ${SERVICE_USER_POSTGRES:-}
      SERVICE_PASSWORD_POSTGRES: ${SERVICE_PASSWORD_POSTGRES:-}
    volumes:
      - pg_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-${SERVICE_USER_POSTGRES:-glitchmao}} -d ${POSTGRES_DB:-glitchmao}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data_prod:
  signer_prod_gpg_home:
