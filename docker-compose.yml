services:
  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.dev
    working_dir: /workspace
    command: sh -lc "npm install --prefix apps/web-nuxt && npm run build --prefix apps/web-nuxt && npm run preview --prefix apps/web-nuxt -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://glitchmao:glitchmao@postgres:5432/glitchmao
      GPG_KEY_ID: test@glitchmao.local
      SIGNER_SERVICE_URL: http://signer:4000
      VERIFICATION_BASE_URL: http://localhost:3000/verify
    depends_on:
      postgres:
        condition: service_healthy
      signer:
        condition: service_started

  signer:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.dev
    working_dir: /workspace
    command: sh -lc "cargo run --release -p signer-service"
    environment:
      GPG_KEY_ID: test@glitchmao.local
      SIGNER_DEFAULT_KEY_ID: test@glitchmao.local
      SIGNER_HOST: 0.0.0.0
      SIGNER_PORT: 4000
    volumes:
      - .:/workspace
      - signer_prod_cargo_cache:/usr/local/cargo/registry
      - signer_prod_gpg_home:/root/.gnupg

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: glitchmao
      POSTGRES_PASSWORD: glitchmao
      POSTGRES_DB: glitchmao
    ports:
      - "5432:5432"
    volumes:
      - pg_data_prod:/var/lib/postgresql/data
      - ./infra/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchmao -d glitchmao"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data_prod:
  signer_prod_cargo_cache:
  signer_prod_gpg_home:
